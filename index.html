<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Gym System | Professional Gym Management System & Affordable Fitness Software</title>
    <meta name="description" content="Power Gym System is a high-performance gym management system and affordable fitness software. Streamline memberships, staff tracking, and financial reporting.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.72);
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text: #0f172a;
            --glass: rgba(255, 255, 255, 0.56);
            --border: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        img { max-width: 100%; height: auto; display: block; }

        body {
            background: #dbe4ee;
            color: var(--text);
            min-height: 100dvh;
            overflow-x: hidden;
            position: relative;
            isolation: isolate;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(4px) saturate(0.95);
            transform: scale(1.03);
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.14);
            z-index: -1;
        }

        /* Centering utility for Login screens */
        .auth-center {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            padding: clamp(16px, 3vw, 28px);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes dashboardEntry {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes viewSlideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .hidden { display: none !important; }

        /* Glass Card */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: clamp(22px, 4vw, 40px);
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.5s ease forwards;
        }

        h1 { font-size: clamp(1.4rem, 2.8vw, 1.8rem); font-weight: 700; margin-bottom: 8px; text-align: center; letter-spacing: -0.5px; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 0.9rem; }

        /* Form Elements */
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.8rem; color: #64748b; margin-bottom: 6px; margin-left: 4px; }
        input {
            width: 100%;
            padding: 14px 18px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: 0.2s;
            font-size: 1rem;
        }
        input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(56, 189, 248, 0.4); }

        /* Dashboard Layout */
        .dashboard-container {
            display: flex;
            width: 100%;
            min-height: 100dvh;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 0;
            border: 1px solid var(--border);
            overflow: hidden;
            animation: dashboardEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .brand-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.5);
            border-right: 1px solid var(--border);
            padding: clamp(18px, 3vw, 30px);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .main-content { flex: 1; min-width: 0; padding: clamp(18px, 4vw, 40px); overflow-y: auto; }
        .view-animate { animation: viewSlideIn 0.4s ease-out forwards; }

        /* Splash Screen Overlay */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease-out;
        }

        #splash-screen img {
            animation: logoScale 1s ease-out forwards;
        }

        @keyframes logoScale {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            color: #64748b;
            transition: 0.2s;
        }
        .nav-item:hover { background: rgba(0, 0, 0, 0.05); color: var(--text); }
        .nav-item.active { background: var(--accent); color: white; font-weight: 600; }

        /* Tables & Stats */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 12px; color: #64748b; font-weight: 400; font-size: 0.85rem; }
        td { background: white; padding: 16px; border-bottom: 1px solid var(--border); }
        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; text-align: right; }

        .stats-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 24px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .stat-card h3 { color: #64748b; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 8px; }
        .stat-card p { font-size: 2rem; font-weight: 700; color: var(--accent); }

        .logout-btn { margin-top: auto; color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); text-align: center; }
        
        select {
            width: 100%;
            padding: 14px 18px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            margin-bottom: 16px;
            outline: none;
        }

        /* Floating Action Button for Mobile */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            color: #0f172a;
            border: none;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4);
            font-size: 30px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* Custom message card (replaces browser alerts) */
        .message-wrap {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: min(94vw, 460px);
        }

        .message-card {
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-left: 6px solid #ef4444;
            border-radius: 16px;
            padding: 14px 16px;
            color: #f8fafc;
            font-weight: 600;
            letter-spacing: 0.2px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 18px 36px rgba(2, 6, 23, 0.45);
            opacity: 0;
            transform: translateY(-18px) scale(0.96);
            animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .message-card.success { border-left-color: #22c55e; }
        .message-card.info { border-left-color: var(--accent); }
        .message-card.fade-out { animation: msgOut 0.32s ease forwards; }

        @keyframes msgIn {
            60% { opacity: 1; transform: translateY(3px) scale(1.01); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes msgOut {
            to { opacity: 0; transform: translateY(-10px) scale(0.98); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 1024px) {
            .stats-row { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
                border-radius: 0;
            }

            .sidebar {
                width: 100%;
                height: auto;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            #nav-links {
                display: flex;
                gap: 8px;
                overflow-x: auto;
                padding-bottom: 10px;
                scrollbar-width: none; /* Hide scrollbar Firefox */
            }
            #nav-links::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

            .nav-item { margin-bottom: 0; white-space: nowrap; font-size: 0.85rem; }

            .stats-row { grid-template-columns: 1fr; }

            .main-content {
                padding: 20px;
            }

            .glass-card { border-radius: 20px; }

            th, td { padding: 12px; font-size: 0.9rem; }

            .fab { display: flex; }
        }

        @media (max-width: 480px) {
            .brand-logo {
                width: 92px;
                height: 92px;
                margin-bottom: 10px;
            }

            .btn {
                padding: 12px;
                font-size: 0.95rem;
            }

            .nav-item { font-size: 0.8rem; padding: 10px 12px; }
            .main-content { padding: 14px; }
            .table-wrapper { margin: 0 -4px; }
            th, td { padding: 10px; font-size: 0.82rem; }
            .message-wrap { top: 12px; width: calc(100vw - 16px); }
            .message-card { padding: 12px 13px; font-size: 0.92rem; border-radius: 14px; }
        }
    </style>
</head>
<body class="auth-center">

    <div id="splash-screen">
        <img src="fade out.png" alt="Power Gym Logo" style="width: 180px; height: 180px; object-fit: contain;">
    </div>

    <div id="screen-gate" class="glass-card">
        <img src="logo.png" alt="Power Gym Logo" class="brand-logo">
        <h1>Power Gym System</h1>
        <p class="subtitle">Secure Management Gateway</p>
        <div class="input-group">
            <label>Master Access Key</label>
            <input type="password" id="sys-key" placeholder="••••••••" autofocus>
        </div>
        <button class="btn" onclick="checkGate()">Enter System</button>
    </div>

    <div id="screen-auth-choice" class="glass-card hidden">
        <h1>Welcome Back</h1>
        <p class="subtitle">Please select your portal</p>
        <button class="btn" onclick="showAuth('admin')">Administrator Portal</button>
        <button class="btn" onclick="showAuth('staff')" style="background: white; border: 1px solid var(--border); color: var(--text); margin-top: 15px;">Staff Portal</button>
    </div>

    <div id="screen-login" class="glass-card hidden">
        <h1 id="login-title">Login</h1>
        <p class="subtitle">Enter your credentials</p>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="user-field">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="pass-field">
        </div>
        <button class="btn" onclick="handleLogin()">Sign In</button>
        <button class="btn" onclick="showScreen('screen-auth-choice')" style="background:none; color:#64748b; font-size: 0.8rem;">Go Back</button>
    </div>

    <div id="screen-dashboard" class="dashboard-container hidden">
        <div class="sidebar">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px;">
                <img src="logo.png" alt="Logo" style="width: 48px; height: 48px; object-fit: contain;">
                <h1 style="color: var(--accent); margin-bottom: 0; font-size: 1.2rem; text-align: left;">Power Gym</h1>
            </div>
            <div id="nav-links">
            </div>
            <div id="refresh-btn" class="nav-item" style="color: var(--accent); border: 1px dashed var(--accent); margin-top: 20px; text-align: center;" onclick="refreshData()">↻ Refresh Data</div>
            <div class="nav-item" style="margin-top: 10px; text-align: center; border: 1px solid var(--border);" onclick="backToChoice()">← Switch Portal</div>
            <div class="nav-item logout-btn" onclick="location.reload()">Exit System</div>
        </div>
        <div class="main-content" id="main-view">
        </div>
        <button class="fab" onclick="addMemberForm()" title="Add Member">+</button>
    </div>

    <div id="message-wrap" class="message-wrap" aria-live="polite"></div>

    <script>
        // GLOBAL STATE & CLOUD CONFIG
        let appData = {
            employees: [],
            members: [],
            payments: [],
            config: {
                masterKey: "1234",
                admin: {
                    username: "admin",
                    password: "123"
                }
            }
        };

        const BIN_ID = "69d1f9c1856a682189febe13";
        const API_KEY = "$2a$10$boob7HiU/Qq/iPITpxeE0.knWZ6rRbVaVVdBwmJlAgmAbrlr2gX1.";

        let authMode = ""; 
        let currentView = null;

        function showMessage(text, type = "error") {
            const wrap = document.getElementById("message-wrap");
            if (!wrap) return;

            const card = document.createElement("div");
            card.className = `message-card ${type}`;
            const label = type === "success" ? "Success" : type === "info" ? "Info" : "Error";
            card.textContent = `${label}: ${text}`;
            wrap.appendChild(card);

            setTimeout(() => {
                card.classList.add("fade-out");
                setTimeout(() => card.remove(), 260);
            }, 3000);
        }

        // JSONBIN OPERATIONS
        async function loadData() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: {
                        "X-Master-Key": API_KEY
                    }
                });
                const json = await res.json();
                return json.record || appData;
            } catch (err) {
                console.error("Cloud sync failed, using local defaults:", err);
                return appData;
            }
        }

        async function saveData(data) {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify(data)
            });
        }

        // INITIAL LOAD
        (async () => {
            // Splash Screen Logic: Show for 1 sec, then fade out
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.classList.add('hidden'), 500);
                }
            }, 1000);

            appData = await loadData();
        })();

        // ENTER KEY GLOBAL LISTENER
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const activeScreen = document.querySelector('.glass-card:not(.hidden)');
                if (activeScreen) {
                    const btn = activeScreen.querySelector('.btn');
                    if (btn) btn.click();
                }
            }
        });

        function showScreen(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // 1. GATEKEEPER
        function checkGate() {
            const input = document.getElementById('sys-key').value;
            if (input === appData.config.masterKey) {
                showScreen('screen-auth-choice');
            } else {
                showMessage("Access denied");
            }
        }

        // 2. AUTH SELECTION
        function showAuth(mode) {
            authMode = mode;
            document.getElementById('login-title').innerText = mode === 'admin' ? "Admin Login" : "Staff Login";
            document.getElementById('user-field').value = "";
            document.getElementById('pass-field').value = "";
            showScreen('screen-login');
        }

        // 3. LOGIN LOGIC
        async function handleLogin() {
            const u = document.getElementById('user-field').value;
            const p = document.getElementById('pass-field').value;

            if (authMode === 'admin') {
                if (u === appData.config.admin.username && p === appData.config.admin.password) {
                    launchDashboard('admin');
                } else showMessage("Invalid admin login");
            } else {
                const emp = appData.employees.find(e => e.user === u && e.pass === p);
                if (emp) {
                    emp.lastActive = new Date().toLocaleString();
                    saveData(appData);
                    launchDashboard('staff');
                } else showMessage("Invalid staff login");
            }
        }

        async function refreshData() {
            const btn = document.getElementById('refresh-btn');
            btn.innerText = "↻ Syncing...";
            appData = await loadData();
            if(currentView) currentView();
            btn.innerText = "↻ Refresh Data";
        }

        function backToChoice() {
            document.body.classList.add('auth-center');
            showScreen('screen-auth-choice');
        }

        // 4. DASHBOARD RENDERER
        function launchDashboard(role) {
            document.body.classList.remove('auth-center');
            showScreen('screen-dashboard');
            renderNav(role);

            const mainView = document.getElementById('main-view');
            mainView.classList.remove('view-animate');
            void mainView.offsetWidth; // Force reflow to restart animation
            mainView.classList.add('view-animate');
            
            currentView = role === 'admin' ? viewStats : viewMembers;
            currentView();
        }

        function renderNav(role) {
            const nav = document.getElementById('nav-links');
            nav.innerHTML = role === 'admin' ? `
                <div class="nav-item" onclick="switchTab(this, viewStats)">Overview</div>
                <div class="nav-item" onclick="switchTab(this, viewEmployees)">Manage Staff</div>
                <div class="nav-item" onclick="switchTab(this, viewPayments)">Finances</div>
            ` : `
                <div class="nav-item" onclick="switchTab(this, viewMembers)">Members</div>
                <div class="nav-item" onclick="switchTab(this, addMemberForm)">Add Member</div>
                <div class="nav-item" onclick="switchTab(this, addPaymentForm)">Record Payment</div>
            `;
            nav.querySelector('.nav-item').classList.add('active');
        }

        function switchTab(el, func) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            const mainView = document.getElementById('main-view');
            mainView.classList.remove('view-animate');
            void mainView.offsetWidth; // Force reflow to restart animation
            mainView.classList.add('view-animate');

            currentView = func;
            func();
        }

        // --- ADMIN VIEWS ---
        function viewStats() {
            const revenue = appData.payments.reduce((sum, p) => sum + parseFloat(p.amount), 0);
            document.getElementById('main-view').innerHTML = `
                <h2>System Overview</h2>
                <div class="stats-row">
                    <div class="stat-card"><h3>Staff</h3><p>${appData.employees.length}</p></div>
                    <div class="stat-card"><h3>Total Members</h3><p>${appData.members.length}</p></div>
                    <div class="stat-card"><h3>Revenue</h3><p>$${revenue.toFixed(2)}</p></div>
                </div>
            `;
        }

        function viewEmployees() {
            let rows = appData.employees.map(e => `
                <tr>
                    <td>${e.id}</td>
                    <td>${e.name || '-'}</td>
                    <td>${e.role || '-'}</td>
                    <td>${e.phone || '-'}</td>
                    <td>${e.user}</td>
                    <td>${e.lastActive || 'Never'}</td>
                    <td>
                        <button onclick="editEmpForm(${e.id})" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-right: 10px;">Edit</button>
                        <button onclick="deleteEmp(${e.id})" style="background:none; border:none; color:#ef4444; cursor:pointer;">Delete</button>
                    </td>
                </tr>`).join('');
            document.getElementById('main-view').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
                    <h2>Staff Management</h2>
                    <button class="btn" onclick="addEmpForm()" style="width:auto; padding: 10px 20px;">+ Add Staff</button>
                </div>
                <div class="table-wrapper">
                    <table><thead><tr><th>ID</th><th>Full Name</th><th>Role</th><th>Phone</th><th>Username</th><th>Last Active</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>
                </div>
            `;
        }

        // --- STAFF VIEWS ---
        function viewMembers() {
            document.getElementById('main-view').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
                    <h2>Gym Members</h2>
                    <input type="text" id="member-search" placeholder="Search by name..." oninput="filterMembers()" style="width: 100%; max-width: 250px;">
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Phone</th><th>Age</th><th>Plan</th><th>Status</th><th></th></tr>
                        </thead>
                        <tbody id="member-table-body">
                            ${renderMemberRows(appData.members)}
                        </tbody>
                    </table>
                </div>`;
        }

        function renderMemberRows(data) {
            return data.map(m => `
                <tr>
                    <td>#${m.id}</td>
                    <td>${m.name}</td>
                    <td>${m.phone || '-'}</td>
                    <td>${m.age || '-'}</td>
                    <td>${m.plan}</td>
                    <td>${m.status}</td>
                    <td>
                        <button onclick="editMemberForm(${m.id})" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-right:10px;">Edit</button>
                        <button onclick="deleteMember(${m.id})" style="background:none; border:none; color:#ef4444; cursor:pointer;">Remove</button>
                    </td>
                </tr>`).join('');
        }

        function filterMembers() {
            const query = document.getElementById('member-search').value.toLowerCase();
            const filtered = appData.members.filter(m => m.name.toLowerCase().includes(query));
            document.getElementById('member-table-body').innerHTML = renderMemberRows(filtered);
        }

        // --- FORMS ---
        function addEmpForm() {
            document.getElementById('main-view').innerHTML = `
                <h2>New Staff Member</h2>
                <div class="glass-card" style="max-width:100%; margin-top:20px;">
                    <input type="text" id="new-name" placeholder="Full Name" style="margin-bottom:15px;">
                    <input type="text" id="new-role" placeholder="Role (e.g. Trainer, Reception)" style="margin-bottom:15px;">
                    <input type="tel" id="new-phone" placeholder="Phone Number" style="margin-bottom:15px;">
                    <input type="text" id="new-u" placeholder="Username" style="margin-bottom:15px;">
                    <input type="password" id="new-p" placeholder="Password" style="margin-bottom:15px;">
                    <button class="btn" onclick="saveEmp()">Create Account</button>
                </div>
            `;
        }

        function editEmpForm(id) {
            const emp = appData.employees.find(e => e.id === id);
            if(!emp) return;
            document.getElementById('main-view').innerHTML = `
                <h2>Edit Staff Member</h2>
                <div class="glass-card" style="max-width:100%; margin-top:20px;">
                    <label>Full Name</label>
                    <input type="text" id="edit-name" value="${emp.name || ''}" style="margin-bottom:15px;">
                    <label>Role</label>
                    <input type="text" id="edit-role" value="${emp.role || ''}" style="margin-bottom:15px;">
                    <label>Phone Number</label>
                    <input type="tel" id="edit-phone" value="${emp.phone || ''}" style="margin-bottom:15px;">
                    <label>Username</label>
                    <input type="text" id="edit-u" value="${emp.user}" style="margin-bottom:15px;">
                    <label>Password</label>
                    <input type="password" id="edit-p" value="${emp.pass}" style="margin-bottom:15px;">
                    <button class="btn" onclick="updateEmp(${id})">Save Changes</button>
                    <button class="btn" onclick="viewEmployees()" style="background:none; color:#64748b;">Cancel</button>
                </div>
            `;
        }

        function updateEmp(id) {
            const name = document.getElementById('edit-name').value;
            const role = document.getElementById('edit-role').value;
            const phone = document.getElementById('edit-phone').value;
            const u = document.getElementById('edit-u').value;
            const p = document.getElementById('edit-p').value;
            if(!name || !role || !phone || !u || !p) return showMessage("Fill all staff fields");
            const idx = appData.employees.findIndex(e => e.id === id);
            appData.employees[idx].name = name;
            appData.employees[idx].role = role;
            appData.employees[idx].phone = phone;
            appData.employees[idx].user = u;
            appData.employees[idx].pass = p;
            viewEmployees();
            saveData(appData);
        }

        function saveEmp() {
            const name = document.getElementById('new-name').value;
            const role = document.getElementById('new-role').value;
            const phone = document.getElementById('new-phone').value;
            const u = document.getElementById('new-u').value;
            const p = document.getElementById('new-p').value;
            if(!name || !role || !phone || !u || !p) return showMessage("Required staff fields missing");
            appData.employees.push({ id: Date.now(), name: name, role: role, phone: phone, user: u, pass: p });
            viewEmployees();
            saveData(appData);
        }

        // Shared back-end logic for members and payments would follow the same pattern...
        function addMemberForm() {
            // Sync navigation active state for staff view
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.toggle('active', i.innerText === 'Add Member');
            });

            document.getElementById('main-view').innerHTML = `
                <h2>Register Member</h2>
                <div class="glass-card" style="max-width:100%; margin-top:20px;">
                    <input type="text" id="m-n" placeholder="Full Name" style="margin-bottom:15px;">
                    <input type="tel" id="m-ph" placeholder="Phone Number" style="margin-bottom:15px;">
                    <input type="number" id="m-age" placeholder="Age" min="10" max="100" style="margin-bottom:15px;">
                    <input type="text" id="m-pl" placeholder="Plan (e.g. Pro, Basic)" style="margin-bottom:15px;">
                    <button class="btn" onclick="saveMember()">Add to System</button>
                </div>
            `;
        }

        function saveMember() {
            const n = document.getElementById('m-n').value;
            const ph = document.getElementById('m-ph').value;
            const age = document.getElementById('m-age').value;
            const p = document.getElementById('m-pl').value;
            if(!n || !ph || !age || !p) return showMessage("Fill all member fields");
            appData.members.push({ id: Date.now(), name: n, phone: ph, age: age, plan: p, status: 'Active' });
            // Return to member list and sync navigation active state
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.toggle('active', i.innerText === 'Members');
            });
            viewMembers();
            saveData(appData);
        }

        function editMemberForm(id) {
            const member = appData.members.find(m => m.id === id);
            if(!member) return;

            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.toggle('active', i.innerText === 'Members');
            });

            document.getElementById('main-view').innerHTML = `
                <h2>Edit Member</h2>
                <div class="glass-card" style="max-width:100%; margin-top:20px;">
                    <label>Full Name</label>
                    <input type="text" id="edit-m-n" value="${member.name || ''}" style="margin-bottom:15px;">
                    <label>Phone Number</label>
                    <input type="tel" id="edit-m-ph" value="${member.phone || ''}" style="margin-bottom:15px;">
                    <label>Age</label>
                    <input type="number" id="edit-m-age" value="${member.age || ''}" min="10" max="100" style="margin-bottom:15px;">
                    <label>Plan</label>
                    <input type="text" id="edit-m-pl" value="${member.plan || ''}" style="margin-bottom:15px;">
                    <label>Status</label>
                    <select id="edit-m-st">
                        <option value="Active" ${member.status === 'Active' ? 'selected' : ''}>Active</option>
                        <option value="Inactive" ${member.status === 'Inactive' ? 'selected' : ''}>Inactive</option>
                    </select>
                    <button class="btn" onclick="updateMember(${id})">Save Changes</button>
                    <button class="btn" onclick="viewMembers()" style="background:none; color:#64748b;">Cancel</button>
                </div>
            `;
        }

        function updateMember(id) {
            const n = document.getElementById('edit-m-n').value;
            const ph = document.getElementById('edit-m-ph').value;
            const age = document.getElementById('edit-m-age').value;
            const p = document.getElementById('edit-m-pl').value;
            const st = document.getElementById('edit-m-st').value;
            if(!n || !ph || !age || !p) return showMessage("Fill all member fields");

            const idx = appData.members.findIndex(m => m.id === id);
            if (idx === -1) return showMessage("Member not found");

            appData.members[idx].name = n;
            appData.members[idx].phone = ph;
            appData.members[idx].age = age;
            appData.members[idx].plan = p;
            appData.members[idx].status = st;
            viewMembers();
            saveData(appData);
            showMessage("Member updated", "success");
        }

        function viewPayments() {
            let rows = appData.payments.map(p => {
                const member = appData.members.find(m => m.id == p.mId);
                return `<tr><td>${member ? member.name : 'Unknown'}</td><td>${p.date}</td><td>$${p.amount}</td></tr>`;
            }).join('');
            document.getElementById('main-view').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
                    <h2>Finance History</h2>
                    <button class="btn" onclick="exportPaymentsToCSV()" style="width:auto; padding: 10px 20px;">Export CSV</button>
                </div>
                <div class="table-wrapper">
                    <table><thead><tr><th>Member</th><th>Date</th><th>Amount</th></tr></thead><tbody>${rows}</tbody></table>
                </div>`;
        }

        function addPaymentForm() {
            if (appData.members.length === 0) return document.getElementById('main-view').innerHTML = "<h2>No members found. Add a member first.</h2>";
            let options = appData.members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            document.getElementById('main-view').innerHTML = `
                <h2>Record Payment</h2>
                <div class="glass-card" style="max-width:100%; margin-top:20px;">
                    <label>Member</label>
                    <select id="p-mid">${options}</select>
                    <label>Amount ($)</label>
                    <input type="number" id="p-amt" placeholder="0.00">
                    <button class="btn" onclick="savePayment()">Save Transaction</button>
                </div>
            `;
        }

        function savePayment() {
            const mId = document.getElementById('p-mid').value;
            const amt = document.getElementById('p-amt').value;
            if(!amt) return showMessage("Enter amount");
            appData.payments.push({ mId: mId, amount: parseFloat(amt), date: new Date().toLocaleDateString() });
            viewMembers();
            saveData(appData);
        }

        function deleteEmp(id) {
            appData.employees = appData.employees.filter(e => e.id !== id);
            viewEmployees();
            saveData(appData);
        }

        function deleteMember(id) {
            appData.members = appData.members.filter(m => m.id !== id);
            viewMembers();
            saveData(appData);
        }

        function exportPaymentsToCSV() {
            if (appData.payments.length === 0) return showMessage("No payment history to export.", "info");
            
            const headers = ["Member", "Date", "Amount"];
            const dataRows = appData.payments.map(p => {
                const member = appData.members.find(m => m.id == p.mId);
                return [member ? member.name : 'Unknown', p.date, p.amount];
            });

            let csvContent = [headers, ...dataRows].map(e => e.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", `power_gym_finances_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
