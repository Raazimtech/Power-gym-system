<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Gym System | Professional Gym Management System & Affordable Fitness Software</title>
    <meta name="description" content="Power Gym System is a high-performance gym management system and affordable fitness software. Streamline memberships, staff tracking, and financial reporting.">
    <link rel="icon" type="image/png" sizes="512x512" href="fade out.png">
    <link rel="apple-touch-icon" sizes="512x512" href="fade out.png">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Power Gym">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #e6eef4;
            --card-bg: rgba(255, 255, 255, 0.92);
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text: #0f172a;
            --glass: rgba(255, 255, 255, 0.56);
            --border: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        img { max-width: 100%; height: auto; display: block; }

        body {
            background: transparent;
            color: var(--text);
            min-height: 100dvh;
            overflow-x: hidden;
            position: relative;
            isolation: isolate;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('background3.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: saturate(1.2);
            transform: scale(1.01);
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: transparent;
            z-index: -1;
        }

        /* Centering utility for Login screens */
        .auth-center {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            padding: clamp(16px, 3vw, 28px);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes dashboardEntry {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes viewSlideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .hidden { display: none !important; }

        /* Glass Card */
        .glass-card {
            background: var(--card-bg);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: clamp(22px, 4vw, 40px);
            width: min(92%, 440px);
            box-shadow: 20px 20px 40px rgba(0, 0, 0, 0.1), 
                        inset -10px -10px 20px rgba(0, 0, 0, 0.05), 
                        inset 10px 10px 25px rgba(255, 255, 255, 0.9);
            animation: fadeIn 0.5s ease forwards;
        }

        h1 { font-size: clamp(1.4rem, 2.8vw, 1.8rem); font-weight: 800; margin-bottom: 8px; text-align: center; letter-spacing: -0.5px; color: #000; }
        p.subtitle { text-align: center; color: #334155; margin-bottom: 24px; font-size: 0.9rem; font-weight: 500; }

        /* Form Elements */
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; color: #1e293b; font-weight: 600; margin-bottom: 6px; margin-left: 4px; }
        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(240, 244, 248, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            color: var(--text);
            outline: none;
            transition: 0.2s;
            font-size: 1rem;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05), 
                        inset -4px -4px 8px rgba(255,255,255,0.8);
        }
        input:focus { background: white; }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 8px 8px 16px rgba(37, 99, 235, 0.2), 
                        inset -6px -6px 12px rgba(0,0,0,0.15), 
                        inset 6px 6px 12px rgba(255,255,255,0.2);
        }
        .btn:hover { 
            background: var(--accent-hover); 
            transform: translateY(2px) scale(0.98); 
            box-shadow: 4px 4px 8px rgba(37, 99, 235, 0.15), 
                        inset -10px -10px 15px rgba(0,0,0,0.2), 
                        inset 10px 10px 15px rgba(255,255,255,0.25); 
        }
        .btn:active { transform: translateY(4px) scale(0.96); }

        /* Dashboard Layout */
        .dashboard-container {
            display: flex;
            width: 100%;
            min-height: 100dvh;
            background: transparent;
            border-radius: 0;
            overflow: hidden;
            animation: dashboardEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .brand-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .sidebar {
            width: 280px;
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: clamp(18px, 3vw, 30px);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .main-content { flex: 1; min-width: 0; padding: clamp(18px, 4vw, 40px); overflow-y: auto; background: var(--card-bg); }
        .view-animate { animation: viewSlideIn 0.4s ease-out forwards; }

        /* Splash Screen Overlay */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease-out;
        }

        #splash-screen img {
            animation: logoScale 1s ease-out forwards;
        }

        @keyframes logoScale {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 12px;
            color: #64748b;
            transition: 0.2s ease;
        }
        .nav-item:hover { background: var(--bg); color: var(--text); }
        .nav-item.active { 
            background: var(--accent); 
            color: white; 
            font-weight: 600;
            box-shadow: 6px 6px 12px rgba(37, 99, 235, 0.2), inset -4px -4px 8px rgba(0,0,0,0.1);
        }
        .nav-item:active {
            transform: translateY(2px) scale(0.97);
            box-shadow: inset 5px 5px 10px rgba(0, 0, 0, 0.08), 
                        inset -5px -5px 10px rgba(255, 255, 255, 0.5);
        }

        /* Tables & Stats */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 12px; color: var(--text); font-weight: 600; font-size: 0.85rem; }
        td { background: rgba(255, 255, 255, 0.8); padding: 16px; border-bottom: none; box-shadow: inset 4px 4px 8px rgba(255,255,255,0.5); }
        td:first-child { border-radius: 20px 0 0 20px; }
        td:last-child { border-radius: 0 20px 20px 0; text-align: right; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 24px; 
            border-radius: 30px; 
            box-shadow: 12px 12px 24px rgba(0,0,0,0.06), inset -8px -8px 12px rgba(0,0,0,0.02), inset 8px 8px 12px rgba(255,255,255,0.8);
        }
        .stat-card h3 { color: #64748b; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 8px; }
        .stat-card p { font-size: 2rem; font-weight: 700; color: var(--accent); }

        .logout-btn { 
            margin-top: auto; 
            color: #ef4444; 
            background: #fdf2f2; 
            text-align: center;
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, 0.06), 
                        inset -6px -6px 12px rgba(255, 255, 255, 0.8);
        }
        
        select {
            width: 100%;
            padding: 14px 18px;
            background: #f0f4f8;
            border: none;
            border-radius: 20px;
            color: var(--text);
            margin-bottom: 16px;
            outline: none;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05), inset -4px -4px 8px rgba(255,255,255,0.8);
        }

        /* Floating Action Button for Mobile */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            color: #0f172a;
            border: none;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4);
            font-size: 30px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* Developer Support Widget */
        .support-btn {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #0f172a;
            color: white;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 0.3s;
        }
        .support-btn:hover { transform: scale(1.1); background: var(--accent); }
        .support-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: 800;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #support-chat-window {
            position: fixed;
            bottom: 95px;
            left: 24px;
            width: min(350px, 90vw);
            height: 480px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.25);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1001;
            border: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }
        .support-header { background: #0f172a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 0.95rem; }
        #support-msgs { flex: 1; padding: 15px; overflow-y: auto; background: #f1f5f9; display: flex; flex-direction: column; gap: 12px; }
        .support-input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: white; }
        .support-input-area input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); outline: none; font-size: 0.9rem; color: var(--text); }
        .support-send { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 0 18px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .support-send:hover { background: var(--accent-hover); }
        .support-spinner { border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #fff; border-radius: 50%; width: 14px; height: 14px; animation: spinSupport 0.8s linear infinite; display: none; margin-left: 8px; }
        @keyframes spinSupport { to { transform: rotate(360deg); } }
        .msg-bubble-support { padding: 10px 14px; border-radius: 16px; font-size: 0.85rem; line-height: 1.4; max-width: 85%; position: relative; }
        .msg-bubble-support.customer { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .msg-bubble-support.support { align-self: flex-start; background: white; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        .msg-time-support { font-size: 0.65rem; opacity: 0.6; margin-top: 4px; display: block; text-align: right; }

        /* Custom message card (replaces browser alerts) */
        .message-wrap {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: min(94vw, 460px);
        }

        .message-card {
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-left: 6px solid #ef4444;
            border-radius: 16px;
            padding: 14px 16px;
            color: #f8fafc;
            font-weight: 600;
            letter-spacing: 0.2px;
            box-shadow: 0 18px 36px rgba(2, 6, 23, 0.45);
            opacity: 0;
            transform: translateY(-18px) scale(0.96);
            animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .message-card.success { border-left-color: #22c55e; }
        .message-card.info { border-left-color: var(--accent); }
        .message-card.fade-out { animation: msgOut 0.32s ease forwards; }

        @keyframes msgIn {
            60% { opacity: 1; transform: translateY(3px) scale(1.01); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes msgOut {
            to { opacity: 0; transform: translateY(-10px) scale(0.98); }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
                border-radius: 0;
            }

            .sidebar {
                width: 100%;
                height: auto;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            #nav-links {
                display: flex;
                gap: 8px;
                overflow-x: auto;
                padding-bottom: 10px;
                scrollbar-width: none; /* Hide scrollbar Firefox */
            }
            #nav-links::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

            .nav-item { margin-bottom: 0; white-space: nowrap; font-size: 0.85rem; }

            .stats-row { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }

            .main-content {
                padding: 20px;
            }

            .glass-card { border-radius: 20px; }

            th, td { padding: 12px; font-size: 0.9rem; }

            .fab { display: flex; }
        }

        @media (max-width: 480px) {
            .brand-logo {
                width: 92px;
                height: 92px;
                margin-bottom: 10px;
            }

            .btn {
                padding: 12px;
                font-size: 0.95rem;
            }

            .nav-item { font-size: 0.8rem; padding: 10px 12px; }
            .main-content { padding: 14px; }
            .table-wrapper { margin: 0 -4px; }
            th, td { padding: 10px; font-size: 0.82rem; }
            .message-wrap { top: 12px; width: calc(100vw - 16px); }
            .message-card { padding: 12px 13px; font-size: 0.92rem; border-radius: 14px; }
        }
    </style>
</head>
<body class="auth-center">

    <div id="splash-screen">
        <img src="fade out.png" alt="Power Gym Logo" style="width: 180px; height: 180px; object-fit: contain;">
    </div>

    <div id="screen-gate" class="glass-card">
        <img src="logo.png" alt="Power Gym Logo" class="brand-logo">
        <h1>Power Gym System</h1>
        <p class="subtitle">Secure Management Gateway</p>
        <div class="input-group">
            <label>Master Access Key</label>
            <input type="password" id="sys-key" placeholder="••••••••" autofocus>
        </div>
        <button class="btn" onclick="checkGate()">Enter System</button>
    </div>

    <div id="screen-auth-choice" class="glass-card hidden">
        <h1>Welcome Back</h1>
        <p class="subtitle">Please select your portal</p>
        <button class="btn" onclick="showAuth('admin')">Administrator Portal</button>
        <button class="btn" onclick="showAuth('staff')" style="background: white; border: 1px solid var(--border); color: var(--text); margin-top: 15px;">Staff Portal</button>
    </div>

    <div id="screen-login" class="glass-card hidden">
        <h1 id="login-title">Login</h1>
        <p class="subtitle">Enter your credentials</p>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="user-field">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="pass-field">
        </div>
        <button class="btn" onclick="handleLogin()">Sign In</button>
        <button class="btn" onclick="showScreen('screen-auth-choice')" style="background:none; color:#64748b; font-size: 0.8rem;">Go Back</button>
    </div>

    <div id="screen-dashboard" class="dashboard-container hidden">
        <div class="sidebar">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px;">
                <img src="logo.png" alt="Logo" style="width: 48px; height: 48px; object-fit: contain;">
                <h1 style="color: var(--accent); margin-bottom: 0; font-size: 1.2rem; text-align: left;">Power Gym</h1>
            </div>
            <div id="nav-links">
            </div>
            <div id="refresh-btn" class="nav-item" style="color: var(--accent); border: 1px dashed var(--accent); margin-top: 20px; text-align: center;" onclick="refreshData()">↻ Refresh Data</div>
            <div id="install-app-btn" class="nav-item hidden" style="color: var(--accent); border: 1px solid var(--border); margin-top: 10px; text-align: center;" onclick="promptInstall()">⬇ Install App</div>
            <div class="nav-item" style="margin-top: 10px; text-align: center; border: 1px solid var(--border);" onclick="backToChoice()">← Switch Portal</div>
            <div class="nav-item logout-btn" onclick="exitSystem()">Exit System</div>
        </div>
        <div class="main-content" id="main-view">
        </div>
        <button class="fab" onclick="addMemberForm()" title="Add Member">+</button>
    </div>

    <button class="support-btn" onclick="toggleSupportChat()" title="Contact Developer">💬<span id="support-badge" class="support-badge">1</span></button>

    <div id="support-chat-window">
        <div class="support-header">
            <span>Developer Support</span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button onclick="clearSupportChat()" style="background:none; border:none; color:#94a3b8; cursor:pointer; font-size:0.7rem; font-weight: 600;">Clear History</button>
                <button onclick="toggleSupportChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">×</button>
            </div>
        </div>
        <div id="support-msgs"></div>
        <div class="support-input-area">
            <input type="text" id="support-input" placeholder="How can we help?" onkeypress="if(event.key==='Enter') sendSupportChat()">
            <button class="support-send" id="support-send-btn" onclick="sendSupportChat()">
                <span>Send</span>
                <div class="support-spinner" id="support-loading"></div>
            </button>
        </div>
    </div>

    <div id="message-wrap" class="message-wrap" aria-live="polite"></div>

    <script>
        // CLOUD DATA MODEL (JSONBIN)
        const BIN_ID = "69d51f7aaaba882197d2c186";
        const API_KEY = "$2a$10$boob7HiU/Qq/iPITpxeE0.knWZ6rRbVaVVdBwmJlAgmAbrlr2gX1.";
        const SESSION_KEY = "power_gym_session_v1";
        const DEFAULT_PLANS = [
            { id: "basic", name: "Basic", price: 30, durationDays: 30 },
            { id: "premium", name: "Premium", price: 55, durationDays: 30 },
            { id: "elite", name: "Elite", price: 95, durationDays: 90 }
        ];

        // Developer Support Configuration
        const SUPPORT_BIN_ID = '69d76cd7856a68218914733e';
        const SUPPORT_API_KEY = '$2a$10$boob7HiU/Qq/iPITpxeE0.knWZ6rRbVaVVdBwmJlAgmAbrlr2gX1.';
        const SYSTEM_IDENTIFIER = "Power Gym System"; // Identifier for this system
        let supportData = { chats: {} };
        let lastKnownMsgTime = localStorage.getItem('support_last_time') || '';

        let appData = {
            plans: [...DEFAULT_PLANS],
            employees: [],
            members: [],
            payments: [],
            attendance: [],
            staffAttendance: [],
            config: {
                masterKey: "1234",
                admin: {
                    username: "admin",
                    passHash: ""
                }
            }
        };

        let authMode = ""; 
        let currentView = null;
        let myChart = null;

        function showMessage(text, type = "error") {
            const wrap = document.getElementById("message-wrap");
            if (!wrap) return;

            const card = document.createElement("div");
            card.className = `message-card ${type}`;
            const label = type === "success" ? "Success" : type === "info" ? "Info" : "Error";
            card.textContent = `${label}: ${text}`;
            wrap.appendChild(card);

            setTimeout(() => {
                card.classList.add("fade-out");
                setTimeout(() => card.remove(), 260);
            }, 3000);
        }

        function todayISO() {
            return new Date().toISOString().slice(0, 10);
        }

        function localDayKey(dateLike = new Date()) {
            return new Date(dateLike).toDateString();
        }

        function addDays(dateISO, days) {
            const d = new Date(`${dateISO}T00:00:00`);
            d.setDate(d.getDate() + Number(days || 0));
            return d.toISOString().slice(0, 10);
        }

        function isExpired(expiryDate) {
            if (!expiryDate) return true;
            return new Date(`${expiryDate}T23:59:59`).getTime() < Date.now();
        }

        async function hashString(value) {
            const data = new TextEncoder().encode(value);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
        }

        function getPlanById(planId) {
            return appData.plans.find(p => p.id === planId) || appData.plans[0];
        }

        function setSession(role, userId, username) {
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({
                role,
                userId: userId || null,
                username
            }));
        }

        function getSession() {
            try {
                return JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null");
            } catch {

            appData.members.forEach(m => {

        // JSONBIN OPERATIONS
        async function loadData() {
            try {
                const endpoints = [
                    `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,
                    `https://api.jsonbin.io/v3/b/${BIN_ID}`
                ];

                let loaded = false;
                for (const url of endpoints) {
                    const res = await fetch(url, {
                        headers: {
                            "X-Master-Key": API_KEY,
                            "X-Bin-Meta": "false"
                        }
                    });

                    if (!res.ok) continue;

                    const json = await res.json();
                    const data = (json && typeof json === "object" && "record" in json) ? json.record : json;
                    if (data && typeof data === "object") {
                        appData = data;
                        loaded = true;
                        break;
                    }
                }

                if (!loaded) throw new Error("Unable to read bin record");
            } catch (err) {
                console.error("Cloud sync failed, using defaults:", err);
            }
            appData.plans = Array.isArray(appData.plans) && appData.plans.length ? appData.plans : [...DEFAULT_PLANS];
            appData.attendance = Array.isArray(appData.attendance) ? appData.attendance : [];
            appData.staffAttendance = Array.isArray(appData.staffAttendance) ? appData.staffAttendance : [];
            appData.members = Array.isArray(appData.members) ? appData.members : [];
            appData.employees = Array.isArray(appData.employees) ? appData.employees : [];
            appData.payments = Array.isArray(appData.payments) ? appData.payments : [];
            if (!appData.config) appData.config = { masterKey: "1234", admin: { username: "admin", passHash: "" } };
            if (!appData.config.admin) appData.config.admin = { username: "admin", passHash: "" };
            if (!appData.config.admin.passHash) {
                const legacyAdmin = appData.config.admin.password || "123";
                appData.config.admin.passHash = await hashString(legacyAdmin);
                delete appData.config.admin.password;
            }
            for (const emp of appData.employees) {
                if (!emp.passHash && emp.pass) {
                    emp.passHash = await hashString(emp.pass);
                    delete emp.pass;
                }
            }
            appData.members = appData.members.map(m => {
                const plan = getPlanById(m.planId || (appData.plans.find(p => p.name === m.plan)?.id));
                const startDate = m.startDate || todayISO();
                const expiryDate = m.expiryDate || addDays(startDate, plan.durationDays);
                return {
                    ...m,
                    planId: plan.id,
                    startDate,
                    expiryDate,
                    paymentIds: Array.isArray(m.paymentIds) ? m.paymentIds : []
                };
            });
            refreshMemberStatuses();
            return appData;
        }

        async function saveData(data) {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify(data)
            });
            if (!res.ok) {
                const msg = await res.text();
                console.error("Cloud save failed:", res.status, msg);
            }
        }

        async function handleLogin() {
            const u = document.getElementById('user-field').value.trim();

            const passHash = await hashString(p);

            if (authMode === 'admin') {
                if (u === appData.config.admin.username && passHash === appData.config.admin.passHash) {
                    setSession('admin', null, u);
                    launchDashboard('admin');
                } else showMessage("Invalid admin login");
            } else {
                const emp = appData.employees.find(e => e.user === u && e.passHash === passHash);
                if (emp) {
                    emp.lastActive = new Date().toLocaleString();
                    const alreadyLoggedToday = appData.staffAttendance.some(a => a.staffId === emp.id && localDayKey(a.checkedInAt) === localDayKey());
                    if (!alreadyLoggedToday) {

                            checkedInAt: new Date().toISOString()

                    saveData(appData);

                    launchDashboard('staff');
                } else showMessage("Invalid staff login");
            }
        }

        function renderAnalyticsChart(type = 'pie') {
            const ctx = document.getElementById('analyticsChart');
            if (!ctx) return;
            if (myChart) myChart.destroy();

            let labels = [];
            let data = [];
            let chartLabel = '';
            let backgroundColor = '';

            if (type === 'pie') {
                const revenueByPlan = {};
                appData.payments.forEach(p => {
                    if (p.status === 'unpaid') return;
                    const plan = getPlanById(p.planId);
                    const planName = plan ? plan.name : 'Unknown';
                    revenueByPlan[planName] = (revenueByPlan[planName] || 0) + parseFloat(p.amount);
                });
                labels = Object.keys(revenueByPlan);
                data = Object.values(revenueByPlan);
                chartLabel = 'Revenue ($)';
                backgroundColor = ['#2563eb', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444'];
            } else if (type === 'line') {
                const revenueByDate = {};
                appData.payments.forEach(p => {
                    if (p.status === 'unpaid') return;
                    const d = p.date || 'Unknown';
                    revenueByDate[d] = (revenueByDate[d] || 0) + parseFloat(p.amount);
                });
                labels = Object.keys(revenueByDate).sort((a,b) => new Date(a) - new Date(b));
                data = labels.map(d => revenueByDate[d]);
                chartLabel = 'Revenue ($)';
                backgroundColor = 'rgba(37, 99, 235, 0.1)';
            } else if (type === 'bar') {
                const regsByMonth = {};
                appData.members.forEach(m => {
                    if (!m.startDate) return;
                    const month = m.startDate.substring(0, 7); // Extract YYYY-MM
                    regsByMonth[month] = (regsByMonth[month] || 0) + 1;
                });
                labels = Object.keys(regsByMonth).sort();
                data = labels.map(m => regsByMonth[m]);
                chartLabel = 'New Members';
                backgroundColor = '#2563eb';
            }

            myChart = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: chartLabel,
                        data: data,
                        backgroundColor: backgroundColor,
                        borderColor: '#2563eb',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#2563eb',
                        pointRadius: 5,
                        tension: 0.4,
                        fill: type === 'line'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { font: { family: 'Inter', weight: '600' } } } },
                    scales: type !== 'pie' ? { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } } : {}
                }
            });
        }

        }

        function updateMember(id) {
            const n = document.getElementById('edit-m-n').value;
            const ph = document.getElementById('edit-m-ph').value;
            const age = document.getElementById('edit-m-age').value;
            const planId = document.getElementById('edit-m-plan').value;
            const startDate = document.getElementById('edit-m-start').value || todayISO();
            if(!n || !ph || !age || !planId) return showMessage("Fill all member fields");

            const idx = appData.members.findIndex(m => m.id === id);
            if (idx === -1) return showMessage("Member not found");
            const plan = getPlanById(planId);
            const expiryDate = addDays(startDate, plan.durationDays);

            appData.members[idx].name = n;
            appData.members[idx].phone = ph;
            appData.members[idx].age = age;
            appData.members[idx].planId = planId;
            appData.members[idx].startDate = startDate;
            appData.members[idx].expiryDate = expiryDate;
            appData.members[idx].status = isExpired(expiryDate) ? 'Expired' : 'Active';
            viewMembers();
            saveData(appData);
            showMessage("Member updated", "success");
        }

        function checkInMember(id) {
            const session = getSession();
            if (!session) return showMessage("Login required");
            const member = appData.members.find(m => m.id === id);
            if (!member) return showMessage("Member not found");
            refreshMemberStatuses();
            if (member.status === 'Expired') return showMessage("Cannot check in expired member");
            const alreadyCheckedToday = appData.attendance.some(a => a.memberId === id && localDayKey(a.checkedInAt) === localDayKey());
            if (alreadyCheckedToday) return showMessage("Member already checked in today", "info");
            appData.attendance.push({
                id: Date.now(),
                memberId: id,
                checkedInAt: new Date().toISOString(),
                checkedBy: session.username
            });
            saveData(appData);
            showMessage(`${member.name} checked in`, "success");
        }

        function viewAttendance() {
            const session = getSession();
            const isAdmin = session && session.role === 'admin';
            const memberRows = [...appData.attendance].reverse().map(a => {
                const member = appData.members.find(m => m.id === a.memberId);
                return `<tr><td>${member ? member.name : 'Unknown'}</td><td>${new Date(a.checkedInAt).toLocaleString()}</td><td>${a.checkedBy || '-'}</td><td>${isAdmin ? `<button onclick="removeMemberAttendance(${a.id})" style="background:none; border:none; color:#ef4444; cursor:pointer;">Remove</button>` : '-'}</td></tr>`;
            }).join('');
            const staffRows = [...appData.staffAttendance].reverse().map(a => {
                const staff = appData.employees.find(e => e.id === a.staffId);
                return `<tr><td>${staff ? staff.name || staff.user : 'Unknown'}</td><td>${staff ? staff.role || '-' : '-'}</td><td>${new Date(a.checkedInAt).toLocaleString()}</td><td>${isAdmin ? `<button onclick="removeStaffAttendance(${a.id})" style="background:none; border:none; color:#ef4444; cursor:pointer;">Remove</button>` : '-'}</td></tr>`;
            }).join('');
            document.getElementById('main-view').innerHTML = `
                <h2>Attendance Log</h2>
                ${isAdmin ? `<div style="display:flex; justify-content:flex-end; margin-bottom:12px;"><button class="btn" style="width:auto; padding:10px 16px;" onclick="removeExtraAttendance()">Remove Extra Attendance</button></div>` : ''}
                <div class="table-wrapper">
                    <h3 style="margin-bottom:10px;">Member Attendance</h3>
                    <table style="margin-bottom:20px;"><thead><tr><th>Member</th><th>Check-in Time</th><th>Checked By</th><th>Action</th></tr></thead><tbody>${memberRows || "<tr><td colspan='4'>No member attendance records yet.</td></tr>"}</tbody></table>
                    <h3 style="margin-bottom:10px;">Staff Attendance</h3>
                    <table><thead><tr><th>Staff</th><th>Role</th><th>Sign-in Time</th><th>Action</th></tr></thead><tbody>${staffRows || "<tr><td colspan='4'>No staff attendance records yet.</td></tr>"}</tbody></table>
                </div>
            `;
        }

        function removeMemberAttendance(attendanceId) {
            const session = getSession();
            if (!session || session.role !== 'admin') return showMessage("Only admin can remove attendance");
            appData.attendance = appData.attendance.filter(a => a.id !== attendanceId);
            saveData(appData);
            viewAttendance();
            showMessage("Member attendance removed", "success");
        }

        function removeStaffAttendance(attendanceId) {
            const session = getSession();
            if (!session || session.role !== 'admin') return showMessage("Only admin can remove attendance");
            appData.staffAttendance = appData.staffAttendance.filter(a => a.id !== attendanceId);
            saveData(appData);
            viewAttendance();
            showMessage("Staff attendance removed", "success");
        }

        function removeExtraAttendance() {
            const session = getSession();
            if (!session || session.role !== 'admin') return showMessage("Only admin can remove extra attendance");

            const keepMember = new Set();
            const uniqueMember = [];
            [...appData.attendance]
                .sort((a, b) => new Date(a.checkedInAt) - new Date(b.checkedInAt))
                .forEach(a => {
                    const key = `${a.memberId}|${localDayKey(a.checkedInAt)}`;
                    if (!keepMember.has(key)) {
                        keepMember.add(key);
                        uniqueMember.push(a);
                    }
                });

            const keepStaff = new Set();
            const uniqueStaff = [];
            [...appData.staffAttendance]
                .sort((a, b) => new Date(a.checkedInAt) - new Date(b.checkedInAt))
                .forEach(a => {
                    const key = `${a.staffId}|${localDayKey(a.checkedInAt)}`;
                    if (!keepStaff.has(key)) {
                        keepStaff.add(key);
                        uniqueStaff.push(a);
                    }
                });

            const removedCount = (appData.attendance.length - uniqueMember.length) + (appData.staffAttendance.length - uniqueStaff.length);
            appData.attendance = uniqueMember;
            appData.staffAttendance = uniqueStaff;
            saveData(appData);
            viewAttendance();
            showMessage(removedCount > 0 ? `${removedCount} extra attendance record(s) removed` : "No extra attendance found", "info");
        }

        function checkInStaff(staffId) {
            const session = getSession();
            if (!session || session.role !== 'admin') return showMessage("Only admin can check in staff");
            const staff = appData.employees.find(e => e.id === staffId);
            if (!staff) return showMessage("Staff not found");

            const alreadyCheckedToday = appData.staffAttendance.some(a => a.staffId === staffId && localDayKey(a.checkedInAt) === localDayKey());
            if (alreadyCheckedToday) return showMessage("Staff already checked in today", "info");

            appData.staffAttendance.push({
                id: Date.now(),
                staffId: staffId,
                checkedInAt: new Date().toISOString()
            });
            saveData(appData);
            showMessage(`${staff.name || staff.user} checked in`, "success");
        }

        function viewPayments() {
            let rows = appData.payments.map(p => {
                const member = appData.members.find(m => m.id == p.memberId);
                const plan = getPlanById(p.planId);
                return `<tr><td>${member ? member.name : 'Unknown'}</td><td>${plan ? plan.name : '-'}</td><td>${p.periodStart || '-'} to ${p.periodEnd || '-'}</td><td>$${p.amount}</td><td>${p.status || 'paid'}</td><td>${p.date}</td></tr>`;
            }).join('');
            document.getElementById('main-view').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
                    <h2>Finance History</h2>
                    <button class="btn" onclick="exportPaymentsToCSV()" style="width:auto; padding: 10px 20px;">Export CSV</button>
                </div>
                <div class="table-wrapper">
                    <table><thead><tr><th>Member</th><th>Plan</th><th>Period</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table>
                </div>`;
        }

        function addPaymentForm() {
            if (appData.members.length === 0) return document.getElementById('main-view').innerHTML = "<h2>No members found. Add a member first.</h2>";
            let options = appData.members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            document.getElementById('main-view').innerHTML = `
                <h2>Record Payment</h2>
                <div class="glass-card" style="max-width:100%; margin-top:20px;">
                    <label>Member</label>
                    <select id="p-mid" onchange="fillPaymentDetails()">${options}</select>
                    <label>Plan</label>
                    <input type="text" id="p-plan" disabled style="margin-bottom:15px;">
                    <label>Membership Period</label>
                    <input type="text" id="p-period" disabled style="margin-bottom:15px;">
                    <label>Amount ($)</label>
                    <input type="number" id="p-amt" placeholder="0.00" style="margin-bottom:15px;">
                    <label>Payment Status</label>
                    <select id="p-status">
                        <option value="paid">Paid</option>
                        <option value="unpaid">Unpaid</option>
                    </select>
                    <button class="btn" onclick="savePayment()">Save Transaction</button>
                </div>
            `;
            fillPaymentDetails();
        }

        function fillPaymentDetails() {
            const mId = Number(document.getElementById('p-mid')?.value || 0);
            const member = appData.members.find(m => m.id === mId);
            if (!member) return;
            const plan = getPlanById(member.planId);
            const planBox = document.getElementById('p-plan');
            const periodBox = document.getElementById('p-period');
            const amountBox = document.getElementById('p-amt');
            if (planBox) planBox.value = `${plan.name} (${plan.durationDays} days)`;
            if (periodBox) periodBox.value = `${member.startDate} to ${member.expiryDate}`;
            if (amountBox && !amountBox.value) amountBox.value = Number(plan.price).toFixed(2);
        }

        function savePayment() {
            const mId = Number(document.getElementById('p-mid').value);
            const amt = Number(document.getElementById('p-amt').value);
            const status = document.getElementById('p-status').value;
            if(!amt || !mId) return showMessage("Enter amount");
            const member = appData.members.find(m => m.id === mId);
            if (!member) return showMessage("Member not found");
            const plan = getPlanById(member.planId);
            let periodStart = member.startDate;
            let periodEnd = member.expiryDate;
            if (status === 'paid') {
                periodStart = isExpired(member.expiryDate) ? todayISO() : addDays(member.expiryDate, 1);
                periodEnd = addDays(periodStart, plan.durationDays);
                member.startDate = periodStart;
                member.expiryDate = periodEnd;
                member.status = 'Active';
            }
            const paymentId = Date.now();
            appData.payments.push({
                id: paymentId,
                memberId: mId,
                planId: member.planId,
                periodStart: periodStart,
                periodEnd: periodEnd,
                amount: parseFloat(amt),
                status: status,
                date: new Date().toLocaleDateString()
            });
            member.paymentIds = Array.isArray(member.paymentIds) ? member.paymentIds : [];
            member.paymentIds.push(paymentId);
            viewMembers();
            saveData(appData);
        }

        function deleteEmp(id) {
            appData.employees = appData.employees.filter(e => e.id !== id);
            appData.staffAttendance = appData.staffAttendance.filter(a => a.staffId !== id);
            viewEmployees();
            saveData(appData);
        }

        function deleteMember(id) {
            appData.members = appData.members.filter(m => m.id !== id);
            appData.payments = appData.payments.filter(p => p.memberId !== id);
            appData.attendance = appData.attendance.filter(a => a.memberId !== id);
            viewMembers();
            saveData(appData);
        }

        function exportPaymentsToCSV() {
            if (appData.payments.length === 0) return showMessage("No payment history to export.", "info");
            
            const headers = ["Member", "Plan", "PeriodStart", "PeriodEnd", "Amount", "Status", "Date"];
            const dataRows = appData.payments.map(p => {
                const member = appData.members.find(m => m.id == p.memberId);
                const plan = getPlanById(p.planId);
                return [member ? member.name : 'Unknown', plan ? plan.name : '', p.periodStart, p.periodEnd, p.amount, p.status, p.date];
            });

            let csvContent = [headers, ...dataRows].map(e => e.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", `power_gym_finances_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- Support Chat Functionality ---
        function toggleSupportChat() {
            const win = document.getElementById('support-chat-window');
            const isOpening = win.style.display === 'none' || win.style.display === '';
            win.style.display = isOpening ? 'flex' : 'none';
            
            if (isOpening) {
                document.getElementById('support-badge').style.display = 'none';
                const uid = getSupportUID();
                if (supportData.chats && supportData.chats[uid] && supportData.chats[uid].messages.length > 0) {
                    lastKnownMsgTime = supportData.chats[uid].messages.slice(-1)[0].time;
                    localStorage.setItem('support_last_time', lastKnownMsgTime);
                }
                syncSupport();
            }
        }

        function getSupportUID() {
            const session = getSession();
            if (session && session.username) return session.username;
            let uid = localStorage.getItem('support_uid');
            if (!uid) {
                uid = 'Guest-' + Math.random().toString(36).substr(2, 5).toUpperCase();
                localStorage.setItem('support_uid', uid);
            }
            return uid;
        }

        async function syncSupport() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${SUPPORT_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': SUPPORT_API_KEY, "X-Bin-Meta": "false" }
                });
                if (!res.ok) return;
                const record = await res.json();
                supportData = (record && record.chats) ? record : { chats: {} };
                
                const uid = getSupportUID();
                const win = document.getElementById('support-chat-window');
                const chat = supportData.chats ? supportData.chats[uid] : null;
                
                if (chat && chat.messages.length > 0 && win.style.display !== 'flex') {
                    const lastMsg = chat.messages[chat.messages.length - 1];
                    if (lastMsg.sender === 'support' && lastMsg.time !== lastKnownMsgTime) {
                        document.getElementById('support-badge').style.display = 'flex';
                    }
                }
                renderSupport();
            } catch (e) { console.error("Support sync error"); }
        }

        function renderSupport() {
            const uid = getSupportUID();
            const container = document.getElementById('support-msgs');
            const chat = supportData.chats ? supportData.chats[uid] : null;
            
            if (chat && chat.messages.length > 0 && document.getElementById('support-chat-window').style.display === 'flex') {
                lastKnownMsgTime = chat.messages[chat.messages.length - 1].time;
                localStorage.setItem('support_last_time', lastKnownMsgTime);
            }
            
            if (!chat || !chat.messages.length) {
                container.innerHTML = `<div style="text-align:center; color:#64748b; font-size:0.8rem; margin-top:40px; padding:0 20px;">Welcome! Your ID is <b>${uid}</b>. Message the developer for assistance.</div>`;
                return;
            }

            container.innerHTML = chat.messages.map(m => `
                <div class="msg-bubble-support ${m.sender}">
                    ${m.text}
                    <span class="msg-time-support">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function sendSupportChat() {
            const input = document.getElementById('support-input');
            const text = input.value.trim();
            if (!text) return;
            
            const uid = getSupportUID();
            const btn = document.getElementById('support-send-btn');
            const spinner = document.getElementById('support-loading');

            btn.disabled = true;
            spinner.style.display = 'block';

            // Mandatory fetch of latest data before sending to prevent session loss on reload or concurrent writes
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${SUPPORT_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': SUPPORT_API_KEY, "X-Bin-Meta": "false" }
                });
                if (res.ok) {
                    const latest = await res.json();
                    if (latest && latest.chats) {
                        supportData = latest;
                    }
                }

                if (!supportData.chats) supportData.chats = {};
                if (!supportData.chats[uid]) {
                    supportData.chats[uid] = {
                        source: SYSTEM_IDENTIFIER, // Add source identifier for new chats
                        messages: []
                    };
                } else if (!supportData.chats[uid].source) {
                    // If chat exists but source is missing (e.g., old chat or first message after update)
                    supportData.chats[uid].source = SYSTEM_IDENTIFIER;
                }
                
                supportData.chats[uid].messages.push({ sender: 'customer', text: text, time: new Date().toISOString() });
                input.value = '';
                renderSupport();
                
                await fetch(`https://api.jsonbin.io/v3/b/${SUPPORT_BIN_ID}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "X-Master-Key": SUPPORT_API_KEY },
                    body: JSON.stringify(supportData)
                });
            } catch (e) { 
                console.warn("Support operation failed", e); 
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        async function clearSupportChat() {
            const uid = getSupportUID();
            if(!confirm("Are you sure you want to clear your chat history? This cannot be undone.")) return;
            
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${SUPPORT_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': SUPPORT_API_KEY, "X-Bin-Meta": "false" }
                });
                if (res.ok) {
                    const latest = await res.json();
                    if (latest && latest.chats) supportData = latest;
                }

                if (supportData.chats && supportData.chats[uid]) {
                    delete supportData.chats[uid];
                    await fetch(`https://api.jsonbin.io/v3/b/${SUPPORT_BIN_ID}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json", "X-Master-Key": SUPPORT_API_KEY },
                        body: JSON.stringify(supportData)
                    });
                    renderSupport();
                    showMessage("Chat history cleared", "info");
                }
            } catch (e) { console.error("Clear chat error"); }
        }

        // PWA (Install as App) - desktop-first, mobile supported
        let deferredInstallPrompt = null;

        function isRunningStandalone() {
            return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        }

        function showInstallEntry(show) {
            const el = document.getElementById('install-app-btn');
            if (!el) return;
            if (show) el.classList.remove('hidden');
            else el.classList.add('hidden');
        }

        function promptInstall() {
            if (deferredInstallPrompt) {
                deferredInstallPrompt.prompt();
                deferredInstallPrompt.userChoice.then((choice) => {
                    if (choice && choice.outcome === 'accepted') {
                        showInstallEntry(false);
                        showMessage("Install started", "success");
                    }
                    deferredInstallPrompt = null;
                });
                return;
            }

            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            if (isIOS) {
                showMessage("On iPhone/iPad: Share → Add to Home Screen", "info");
                return;
            }

            showMessage("Install isn't available yet. Use Chrome/Edge and make sure this site is served over HTTPS or localhost.", "info");
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            if (!isRunningStandalone()) showInstallEntry(true);
        });

        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            showInstallEntry(false);
            showMessage("App installed", "success");
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch((err) => console.warn('Service worker registration failed', err));

                if (isRunningStandalone()) {
                    showInstallEntry(false);
                    return;
                }

                const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
                if (isIOS) showInstallEntry(true);
            });
        }
    </script>
</body>
</html>
